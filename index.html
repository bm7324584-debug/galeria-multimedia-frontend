<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería Multimedia NoSQL</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-950 min-h-screen">

<div class="container mx-auto px-6 py-10">

<div class="text-center mb-10">

<h1 class="text-5xl font-bold text-white mb-3">
🎵 Galería Multimedia
</h1>

<p class="text-gray-300 text-lg">
MongoDB Atlas + Node.js + Express
</p>

</div>

<div class="bg-white rounded-2xl shadow-2xl p-8 mb-10">

<h2 class="text-2xl font-bold mb-6">
Registrar / Editar Elemento
</h2>

<form id="formMultimedia" class="space-y-4">

<input type="hidden" id="elementoId">

<input
type="text"
id="titulo"
placeholder="Título"
required
class="w-full border p-3 rounded-lg"
>

<textarea
id="descripcion"
placeholder="Descripción"
class="w-full border p-3 rounded-lg"
></textarea>

<div>
<label class="font-semibold">
Imagen
</label>

<input
type="file"
id="imagen"
accept="image/*"
class="w-full mt-2"
>
</div>

<div>
<label class="font-semibold">
Audio
</label>

<input
type="file"
id="audio"
accept="audio/*"
class="w-full mt-2"
>
</div>

<button
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold"
>
Guardar Elemento
</button>

</form>

</div>

<div
id="galeria"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
